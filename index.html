<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Harshul Basava</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500&family=Geist+Mono:wght@300;400&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1a3a2a;
      --ink: #f0ede8;
      --muted: #9dbfaa;
      --accent: #7ecba0;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Geist', sans-serif;
      min-height: 100vh;
      padding: 3rem 3.5rem;
    }

    /* ── Top-right links menu ── */
    .links-menu {
      position: fixed;
      top: 6.2rem;
      right: 3.5rem;
      z-index: 100;
    }

    .links-toggle {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      padding: 0.3rem;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      width: 100%;
      transition: color 0.2s;
    }

    .links-toggle:hover { color: var(--accent); }
    .links-toggle.active { color: #ffffff; }

    .links-toggle svg {
      width: 28px;
      height: 28px;
    }

    .links-dropdown {
      display: none;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.75rem;
      margin-top: 0.6rem;
    }

    .links-dropdown.open { display: flex; }

    .links-dropdown a {
      font-family: 'Geist Mono', monospace;
      font-size: 0.78rem;
      font-weight: 300;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--muted);
      position: relative;
      transition: color 0.2s;
    }

    .links-dropdown a::after {
      content: '';
      position: absolute;
      right: 0;
      bottom: -2px;
      width: 0;
      height: 1px;
      background: var(--accent);
      transition: width 0.25s ease;
    }

    .links-dropdown a:hover { color: var(--accent); }
    .links-dropdown a:hover::after { width: 100%; }

    /* ── Main content ── */
    main {
      max-width: 520px;
      padding-top: 3rem;
    }

    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 2.8rem;
      font-weight: 500;
      letter-spacing: -0.01em;
      line-height: 1.1;
      margin-bottom: 0.3rem;
    }

    .email {
      font-weight: 300;
      font-size: 1.25rem;
      color: var(--muted);
      margin-bottom: 1.8rem;
    }

    p {
      font-size: 0.95rem;
      line-height: 1.7;
      color: #ffffff;
    }
  </style>
</head>
<body>

  <div class="links-menu">
    <button class="links-toggle" id="toggle" aria-label="Toggle links">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
      </svg>
    </button>
    <nav class="links-dropdown" id="dropdown">
      <a href="/resume.pdf" target="_blank" rel="noopener">Resume</a>
      <a href="https://substack.com/@hersheysbaklava?utm_campaign=profile&utm_medium=profile-page" target="_blank" rel="noopener">Substack</a>
      <a href="https://github.com/harshul-basava" target="_blank" rel="noopener">GitHub</a>
      <a href="#" id="meet-link">Meet</a>
    </nav>
  </div>

  <main>
    <h1>Harshul Basava</h1>
    <p class="email">harshul [at] gatech [dot] edu</p>

  </main>

  <script>
    const toggle = document.getElementById('toggle');
    const dropdown = document.getElementById('dropdown');
    toggle.addEventListener('click', () => {
      dropdown.classList.toggle('open');
      toggle.classList.toggle('active');
    });
    document.addEventListener('click', (e) => {
      if (!toggle.contains(e.target) && !dropdown.contains(e.target)) {
        dropdown.classList.remove('open');
        toggle.classList.remove('active');
      }
    });
  </script>
  <!-- Cal floating-popup embed code begins -->
  <script type="text/javascript">
    (function (C, A, L) { let p = function (a, ar) { a.q.push(ar); }; let d = C.document; C.Cal = C.Cal || function () { let cal = C.Cal; let ar = arguments; if (!cal.loaded) { cal.ns = {}; cal.q = cal.q || []; d.head.appendChild(d.createElement("script")).src = A; cal.loaded = true; } if (ar[0] === L) { const api = function () { p(api, arguments); }; const namespace = ar[1]; api.q = api.q || []; if(typeof namespace === "string"){cal.ns[namespace] = cal.ns[namespace] || api;p(cal.ns[namespace], ar);p(cal, ["initNamespace", namespace]);} else p(cal, ar); return;} p(cal, ar); }; })(window, "https://app.cal.com/embed/embed.js", "init");
    Cal("init", "mtg", {origin:"https://app.cal.com"});
    Cal.ns.mtg("ui", {"hideEventTypeDetails":false,"layout":"month_view"});

    // Hide Cal's default floating button, use our own Meet link
    document.addEventListener("DOMContentLoaded", () => {
      // Suppress the floating button by not calling floatingButton
      const meetLink = document.getElementById("meet-link");
      meetLink.addEventListener("click", (e) => {
        e.preventDefault();
        Cal.ns.mtg("modal", {"calLink":"harshulb/mtg","config":{"layout":"month_view"}});
      });
    });
  </script>
  <!-- Cal floating-popup embed code ends -->
</body>
</html>
