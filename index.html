<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Harshul Basava</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500&family=Geist+Mono:wght@300;400&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1a3a2a;
      --ink: #f0ede8;
      --muted: #9dbfaa;
      --accent: #7ecba0;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Geist', sans-serif;
      min-height: 100vh;
      padding: 3rem 3.5rem;
    }

    /* ── Top-right links menu ── */
    .links-menu {
      position: fixed;
      top: 1.5rem;
      right: 1.8rem;
      z-index: 100;
    }

    .links-toggle {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      padding: 0.3rem;
      display: flex;
      align-items: center;
      transition: color 0.2s;
    }

    .links-toggle:hover { color: var(--accent); }

    .links-toggle svg {
      width: 22px;
      height: 22px;
    }

    .links-dropdown {
      display: none;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.75rem;
      margin-top: 0.6rem;
    }

    .links-dropdown.open { display: flex; }

    .links-dropdown a {
      font-family: 'Geist Mono', monospace;
      font-size: 0.78rem;
      font-weight: 300;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--muted);
      position: relative;
      transition: color 0.2s;
    }

    .links-dropdown a::after {
      content: '';
      position: absolute;
      right: 0;
      bottom: -2px;
      width: 0;
      height: 1px;
      background: var(--accent);
      transition: width 0.25s ease;
    }

    .links-dropdown a:hover { color: var(--accent); }
    .links-dropdown a:hover::after { width: 100%; }

    /* ── Main content ── */
    main {
      max-width: 520px;
      padding-top: 6rem;
    }

    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 2.8rem;
      font-weight: 500;
      letter-spacing: -0.01em;
      line-height: 1.1;
      margin-bottom: 0.3rem;
    }

    .email {
      font-weight: 300;
      font-size: 1.25rem;
      color: var(--muted);
      margin-bottom: 1.8rem;
    }

    p {
      font-size: 0.95rem;
      line-height: 1.7;
      color: #ffffff;
    }
  </style>
</head>
<body>

  <div class="links-menu">
    <button class="links-toggle" id="toggle" aria-label="Toggle links">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
      </svg>
    </button>
    <nav class="links-dropdown" id="dropdown">
      <a href="#" target="_blank" rel="noopener">Resume</a>
      <a href="#" target="_blank" rel="noopener">Substack</a>
      <a href="#" target="_blank" rel="noopener">GitHub</a>
    </nav>
  </div>

  <main>
    <h1>Harshul Basava</h1>
    <p class="email">harshul [at] gatech [dot] edu</p>
    <p>Student and AI safety organizer at Georgia Tech.</p>
  </main>

  <script>
    const toggle = document.getElementById('toggle');
    const dropdown = document.getElementById('dropdown');
    toggle.addEventListener('click', () => dropdown.classList.toggle('open'));
    document.addEventListener('click', (e) => {
      if (!toggle.contains(e.target) && !dropdown.contains(e.target)) {
        dropdown.classList.remove('open');
      }
    });
  </script>
</body>
</html>
